syntax = "proto3";
package quasar.v1;

option go_package = "github.com/tehsphinx/quasar/pb";

import "v1/raft.proto";

message Command {
  // To keep numbers in Command and CommandResponse in sync.
  reserved 7;

  oneof cmd {
    Store store = 1;
    LatestUid latest_uid = 2;
    ResetCache reset_cache = 8;
    RemoveServer remove_server = 9;

    AppendEntriesRequest append_entries = 3;
    RequestVoteRequest request_vote = 4;
    InstallSnapshotRequest install_snapshot = 5;
    TimeoutNowRequest timeout_now = 6;
    RequestPreVoteRequest request_pre_vote = 10;
  }
}

message CommandResponse {
  // error message in case of error
  string error = 7;

  oneof resp {
    StoreResponse store = 1;
    LatestUidResponse latest_uid = 2;
    ResetCacheResponse reset_cache = 8;
    RemoveServerResponse remove_server = 9;

    AppendEntriesResponse append_entries = 3;
    RequestVoteResponse request_vote = 4;
    InstallSnapshotResponse install_snapshot = 5;
    TimeoutNowResponse timeout_now = 6;
    RequestPreVoteResponse request_pre_vote = 10;
  }
}

message Store {
  bytes data = 1;
  // optional key only used in case of KVCache
  string key = 2;
}

message StoreResponse {
  uint64 uid = 1;
}

message LatestUid {}

message LatestUidResponse {
  uint64 uid = 1;
}

message ResetCache {
  // A random UUID to identify the reset. This is used to make sure that a reset is only done once
  // and applied to all nodes.
  string uuid = 1;

  // hard requests an out-of-band hard reset: the receiving node tears down and rebuilds its raft on
  // fresh stores (dropping log, term, vote and snapshot) instead of forwarding a log-replicated soft
  // reset to the leader. Used to recover a cluster where a node is ahead of a freshly (re)started
  // leader and no leader can be elected (RT-13034).
  bool hard = 2;

  // initiator_instance_id is the raft instance ID of the node initiating a hard reset. The receiving
  // follower adopts it while rebuilding its raft instead of clearing its own ID and waiting to
  // re-adopt one from a discovery ping of the leader: the wiped node is by construction joining the
  // initiator's consensus history, and discovery delivery is best-effort — a leader crash inside the
  // re-adoption window used to leave followers without an instance ID, disarming fork detection
  // (RT-13067). Empty when the initiator has no instance ID yet; the receiver then falls back to
  // clearing its own.
  string initiator_instance_id = 3;

  // full requests a full reset: the FSM also clears stores that normally survive a reset (e.g.
  // flare's KeepOnReset, cache-only data with no source of truth to re-derive from). It is
  // independent of `hard`: a full reset is still log-replicated through the normal apply path and
  // triggers no raft reinit. Used by an explicit operator hard reset to wipe cache-only data, while
  // a no-leader auto-escalation leaves it false to preserve that data.
  bool full = 4;
}

message ResetCacheResponse {
  // The UID of the reset.
  string uuid = 2;

  // Error message in case of error.
  string error = 1;
}

message RemoveServer {
  string id = 1;
}

message RemoveServerResponse {}
